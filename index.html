<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASSAL</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #000; color: #fff; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; 
            margin: 0; font-family: sans-serif; overflow: hidden; 
        }
        #avatar { 
            width: 250px; height: 250px; 
            background-image: url('vassal_avatar.png'); 
            background-size: cover; border-radius: 50%; 
            margin-bottom: 20px; transition: transform 0.8s ease;
        }
        .bowing { transform: rotate(15deg) translateY(20px); opacity: 0.8; }
        .listening { border: 5px solid #800080; box-shadow: 0 0 20px #800080; }
        #status-text { font-size: 1.2rem; color: #d4af37; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>
    <div id="avatar"></div>
    <div id="status-text">Awaiting your command, My King.</div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        const avatar = document.getElementById('avatar');
        const statusText = document.getElementById('status-text');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        const API_KEY = "AQ.Ab8RN6LFQAbMEKGhmWkcp51yQq567UNhZ06G4e_c5KgywTVCLA";
        
        recognition.onstart = () => { avatar.classList.add('listening'); statusText.innerText = "Listening..."; };
        recognition.onresult = async (e) => {
            const prompt = e.results[0][0].transcript;
            avatar.classList.add('bowing');
            statusText.innerText = "Processing order...";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            statusText.innerText = text;
            setTimeout(() => avatar.classList.remove('bowing'), 2000);
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        };
        recognition.onend = () => { avatar.classList.remove('listening'); setTimeout(() => recognition.start(), 1000); };
        recognition.start();
    </script>
</body>
</html>
