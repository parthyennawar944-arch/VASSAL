<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VASSAL</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #avatar { width: 200px; height: 200px; background: #555; border-radius: 50%; margin-bottom: 20px; }
        .listening { border: 5px solid #00ff00; }
    </style>
</head>
<body>
    <div id="avatar"></div>
    <div id="status-text">Starting...</div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        const avatar = document.getElementById('avatar');
        const statusText = document.getElementById('status-text');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        const API_KEY = "AQ.Ab8RN6LFQAbMEKGhmWkcp51yQq567UNhZ06G4e_c5KgywTVCLA";

        recognition.onstart = () => { avatar.classList.add('listening'); statusText.innerText = "Listening..."; };
        recognition.onresult = async (e) => {
            const prompt = e.results[0][0].transcript;
            statusText.innerText = "Thinking...";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            statusText.innerText = text;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        };
        recognition.onend = () => { avatar.classList.remove('listening'); setTimeout(() => recognition.start(), 1000); };
        recognition.start();
    </script>
</body>
</html>
